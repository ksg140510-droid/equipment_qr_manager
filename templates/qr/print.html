{% extends 'base.html' %}
{% block title %}QR 출력 - {{ eq.eq_name }}{% endblock %}

{% block content %}
<div class="row mt-3 justify-content-center">
  <div class="col-12 col-md-5 col-lg-4">

    <!-- 페이지 헤더 -->
    <div class="app-breadcrumb d-print-none">
      <a href="{{ url_for('index') }}">Home</a><span class="sep">/</span>
      <a href="{{ url_for('equipment_detail', eq_id=eq.id) }}">{{ eq.eq_name }}</a><span class="sep">/</span>
      <span class="current">QR 출력</span>
    </div>
    <div class="page-header">
      <h1 class="page-title">
        <i class="bi bi-qr-code" style="color:var(--mes-cyan)"></i>QR 코드 출력
      </h1>
      <a href="{{ url_for('equipment_detail', eq_id=eq.id) }}"
         class="btn btn-outline-secondary btn-sm d-print-none">
        <i class="bi bi-arrow-left"></i> 설비 상세
      </a>
    </div>

    <div class="card">
      <div class="card-header ch-navy">
        <i class="bi bi-qr-code"></i> QR 라벨
      </div>
      <div class="card-body d-flex justify-content-center py-4">
        <div class="qr-label text-center" id="printArea">
          <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="로고"
               style="height:38px;width:auto;object-fit:contain;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;">
          <div class="fw-bold" style="font-size:1.2rem;color:var(--mes-navy);margin-bottom:2px">
            {{ eq.eq_number }}
          </div>
          <div style="color:var(--mes-muted);font-size:0.85rem;margin-bottom:6px">
            {{ eq.eq_name }}
          </div>
          <div style="margin-bottom:6px">
            <span class="badge bg-section">{{ eq.section }}</span>
          </div>
          {% if eq.location %}
          <div style="color:var(--mes-muted);font-size:0.75rem;margin-bottom:8px">
            <i class="bi bi-geo-alt me-1"></i>{{ eq.location }}
          </div>
          {% endif %}
          <img src="{{ url_for('qr_image', eq_id=eq.id) }}"
               style="max-width:200px;width:100%;display:block;margin:0 auto" alt="QR코드">
          <div style="margin-top:8px;font-size:0.7rem;color:var(--mes-muted);letter-spacing:.5px">
            <i class="bi bi-phone me-1"></i>스캔하여 설비 이력 조회
          </div>
        </div>
      </div>
      <div class="card-footer" style="background:#fff !important;padding:.9rem 1.1rem !important;">
        <div class="d-grid gap-2">
          <button onclick="window.print()" class="btn btn-dark">
            <i class="bi bi-printer"></i> 인쇄
          </button>
          <a href="{{ url_for('qr_generate', eq_id=eq.id) }}"
             class="btn btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> QR 재생성
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
