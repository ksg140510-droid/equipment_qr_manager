<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일시적인 오류 - 설비 QR 이력관리</title>
<style>
  body { font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background:#f4f7fb; margin:0;
         display:flex; align-items:center; justify-content:center; height:100vh; }
  .box { text-align:center; background:#fff; padding:48px 40px; border-radius:16px;
         box-shadow:0 8px 24px rgba(0,0,0,.08); max-width:440px; }
  .code { font-size:4rem; font-weight:900; color:#C62828; margin:0; }
  h1 { font-size:1.2rem; color:#263238; margin:8px 0 4px; }
  p { color:#607D8B; font-size:.9rem; margin:0 0 24px; }
  a { display:inline-block; background:#1565C0; color:#fff; text-decoration:none;
      padding:12px 28px; border-radius:8px; font-weight:700; margin:0 4px; }
  a.secondary { background:#fff; color:#1565C0; border:1px solid #1565C0; }
</style>
</head>
<body>
  <div class="box">
    <p class="code">500</p>
    <h1>일시적인 오류가 발생했습니다</h1>
    <p>요청을 처리하는 중 문제가 발생했습니다. 잠시 후 다시 시도해주시고,<br>
       반복되면 관리자에게 알려주세요.</p>
    <a href="/">대시보드로 이동</a>
    <a href="javascript:history.back()" class="secondary">이전 화면</a>
  </div>
</body>
</html>
