<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 - 설비 QR 이력관리</title>
<style>
  body { font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background:#f4f7fb; margin:0;
         display:flex; align-items:center; justify-content:center; height:100vh; }
  .box { text-align:center; background:#fff; padding:48px 40px; border-radius:16px;
         box-shadow:0 8px 24px rgba(0,0,0,.08); max-width:420px; }
  .code { font-size:4rem; font-weight:900; color:#1565C0; margin:0; }
  h1 { font-size:1.2rem; color:#263238; margin:8px 0 4px; }
  p { color:#607D8B; font-size:.9rem; margin:0 0 24px; }
  a { display:inline-block; background:#1565C0; color:#fff; text-decoration:none;
      padding:12px 28px; border-radius:8px; font-weight:700; }
</style>
</head>
<body>
  <div class="box">
    <p class="code">404</p>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
    <a href="/">대시보드로 이동</a>
  </div>
</body>
</html>
