<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 설비 QR 이력관리</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { font-family: 'Segoe UI', 'Noto Sans KR', sans-serif; background:linear-gradient(135deg,#0d2b4e,#1565C0);
         margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background:#fff; border-radius:16px; padding:40px 36px; width:100%; max-width:380px;
                box-shadow:0 16px 40px rgba(0,0,0,.25); }
  .brand { text-align:center; margin-bottom:28px; }
  .brand .logo-text { font-size:1.4rem; font-weight:900; color:#0d2b4e; letter-spacing:.5px; }
  .brand .sub { font-size:.78rem; color:#607D8B; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  label { font-weight:700; font-size:.85rem; color:#37474F; }
  .btn-login { min-height:52px; font-size:1rem; font-weight:700; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="logo-text">SYNOPEX</div>
      <div class="sub">설비 QR 이력관리</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.85rem">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label">이름</label>
        <select name="actor" class="form-select" required>
          <option value="">이름 선택</option>
          {% for w in workers %}
          <option value="{{ w }}">{{ w }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="비밀번호 입력"
               autofocus autocomplete="current-password" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-login">
          <i class="bi bi-box-arrow-in-right me-1"></i> 접속
        </button>
      </div>
    </form>
  </div>
</body>
</html>
